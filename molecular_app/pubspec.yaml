name: molecular_work_app
description: A starter Flutter app for organizing molecular biology workflows.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+e01
  path_provider: ^2.1.3
  path: ^1.9.0
  pdf: any
  printing: any
  excel: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.11.0

flutter:
  uses-material-design: true